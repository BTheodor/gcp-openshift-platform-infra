input {
  beats {
    port => 5044
    ssl  => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key => "/etc/logstash/certs/logstash.key"
  }
}

filter {
  if [type] == "spring-boot" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} \[%{DATA:service},%{DATA:traceId},%{DATA:spanId}\] %{INT:pid} --- \[%{DATA:thread}\] %{DATA:logger} : %{GREEDYDATA:log_message}" }
    }
    
    # Extract tenant ID from log message if present (custom business logic)
    if [log_message] =~ /tenant_id=/ {
      grok {
        match => { "log_message" => ".*tenant_id=%{WORD:tenant_id}.*" }
      }
    }

    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }

    mutate {
      add_field => { "[@metadata][target_index]" => "logs-spring-boot-%{+YYYY.MM.dd}" }
      remove_field => [ "timestamp", "message" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch.infra.svc:9200"]
    user => "${ES_USER}"
    password => "${ES_PASSWORD}"
    ssl => true
    cacert => "/etc/logstash/certs/ca.crt"
    index => "%{[@metadata][target_index]}"
    ilm_enabled => true
    ilm_rollover_alias => "spring-boot-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "30-day-retention"
  }
}
