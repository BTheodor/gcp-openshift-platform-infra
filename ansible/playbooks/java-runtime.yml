---
- name: Configure Java 17 Runtime Environment
  hosts: app_servers
  become: yes
  vars:
    java_version: "17"
  tasks:
    - name: Install OpenJDK 17
      package:
        name: "openjdk-{{ java_version }}-jdk"
        state: present

    - name: Set JAVA_HOME environment variable
      copy:
        dest: /etc/profile.d/java_env.sh
        content: |
          export JAVA_HOME=$(readlink -f /usr/bin/java | sed "s:bin/java::")
          export PATH=$JAVA_HOME/bin:$PATH
        mode: '0644'

    - name: Configure global JVM default flags
      copy:
        dest: /etc/default/java-opts
        content: |
          # Optimized for high-throughput microservices
          JAVA_OPTS="-server -Xms4g -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:ParallelGCThreads=4 -Djava.net.preferIPv4Stack=true"
        mode: '0644'

    - name: Optimize OS for JVM performance
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes
